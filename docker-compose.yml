services:

  # ── Comprehensive archiver ──────────────────────────────────
  # Runs a full historical backfill / gap-fill across all exchanges.
  # Designed for one-off runs or scheduled cron jobs.
  archiver:
    build: .
    image: nexus_archiver:latest
    container_name: nexus_archiver
    command: ["python", "-m", "src.archiver.comprehensive_archiver"]
    volumes:
      # Persist the SQLite database between runs
      - ./archived_data:/app/archived_data
      # Mount your API key config (never embed secrets in the image)
      - ./config.json:/app/config.json:ro
      # Optional: mount custom markets_info if you want to update it without rebuilding
      # - ./markets_info:/app/markets_info:ro
    environment:
      - TZ=UTC
      # Alternatively supply API keys as environment variables
      # (all sources fall back to env vars if config.json key is absent)
      # - BINANCE_API_KEY=
      # - BINANCE_API_SECRET=
      # - BYBIT_API_KEY=
      # - BYBIT_API_SECRET=
      # - OKX_API_KEY=
      # - OKX_API_SECRET=
      # - MEXC_API_KEY=
      # - MEXC_API_SECRET=
      # - BITGET_API_KEY=
      # - BITGET_API_SECRET=
      # - BITGET_PASSPHRASE=
      # - GATEIO_API_KEY=
      # - GATEIO_API_SECRET=
      # - KUCOIN_API_KEY=
      # - KUCOIN_API_SECRET=
      # - KUCOIN_PASSPHRASE=
      # - COINBASE_API_KEY=
      # - COINBASE_API_SECRET=
      # - PHEMEX_API_KEY=
      # - PHEMEX_API_SECRET=
      # - HL_SECRET_KEY=         (Hyperliquid)
      # - HL_ACCOUNT_ADDRESS=    (Hyperliquid)
    restart: "no"  # Change to "unless-stopped" for always-on backfill mode

  # ── Daily archiver ─────────────────────────────────────────
  # Lightweight daily run: fetches only the latest candles since last run.
  # Use this for scheduled cron jobs (e.g. daily at 00:05 UTC).
  archiver-daily:
    build: .
    image: nexus_archiver:latest
    container_name: nexus_archiver_daily
    command: ["python", "-m", "src.archiver.daily_ohlcv_archiver"]
    volumes:
      - ./archived_data:/app/archived_data
      - ./config.json:/app/config.json:ro
    environment:
      - TZ=UTC
    restart: "no"
